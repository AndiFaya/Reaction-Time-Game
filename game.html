<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reaction Time Game</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="game-page">

    <!-- 
         Change 4: The How-to-Play overlay has been REMOVED
         from this page. It now lives on index.html (the launcher) so
         players see it before they configure their settings, not after.
          -->

    <!-- 
         Change 3: In-page Game-Over banner (replaces the alert() dialog)
          -->
    <div id="gameOverBanner" class="game-over-banner hidden" role="alert" aria-live="assertive">
        <div class="game-over-inner">
            <div class="game-over-trophy">&#x1F3C6;</div>
            <h2 class="game-over-title">Game Over!</h2>
            <p id="gameOverSummary" class="game-over-summary"></p>
            <button id="gameOverCloseBtn" class="btn btn-primary btn-lg">&#x25B6; Play Again</button>
        </div>
    </div>
    <!-- End Change 3 banner -->

    <!-- Stats bar -->
    <header class="game-header">
        <div class="game-header-title">
            <span class="game-title-text">Reaction Time Game</span>
        </div>
        <div class="stats-grid">
            <div class="stat-cell">
                <span class="stat-label">Player</span>
                <span class="stat-value" id="displayPlayer">&mdash;</span>
            </div>
            <div class="stat-cell">
                <span class="stat-label">Round</span>
                <span class="stat-value" id="displayRound">0 / 0</span>
            </div>
            <div class="stat-cell">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="displayScore">0</span>
            </div>
            <div class="stat-cell">
                <span class="stat-label">Best Time</span>
                <span class="stat-value" id="displayBestTime">&mdash;</span>
            </div>
            <div class="stat-cell">
                <span class="stat-label">Average</span>
                <span class="stat-value" id="displayAverageTime">&mdash;</span>
            </div>
            <div class="stat-cell">
                <span class="stat-label">False Starts</span>
                <span class="stat-value" id="displayFalseStarts">0</span>
            </div>
        </div>
    </header>

    <main class="game-main">

        <!-- Round instruction bar -->
        <div id="ruleArea" class="rule-area">
            Current round instruction will appear here.
        </div>

        <!-- Signal area -->
        <div id="signalArea" class="signal-area waiting" tabindex="0" aria-live="polite">
            WAIT...
        </div>

        <!-- Message area -->
        <div id="messageArea" class="message-area" aria-live="polite">
            Click <strong>Start Test</strong> when you are ready.
        </div>

        <!-- 
             Change 5: Primary buttons placed directly below the
             signal area so they are always visible without scrolling.
              -->
        <div class="action-bar">
            <button id="startBtn" class="btn btn-primary">&#x25B6; Start Test</button>
            <button id="nextRoundBtn" class="btn btn-success" disabled>&#x2192; Next Round</button>
            <button id="resetBtn" class="btn btn-ghost">&#x21BA; Reset</button>
        </div>
        <!-- End Change 5 -->

        <!-- Secondary controls -->
        <div class="secondary-bar">
            <button id="saveBtn"  class="btn btn-secondary btn-sm">Save Session</button>
            <button id="loadBtn"  class="btn btn-secondary btn-sm">Load Session</button>
            <button id="backBtn"  class="btn btn-ghost btn-sm">Back to Settings</button>
        </div>

        <!-- Per-round results -->
        <section class="results-section">
            <h3 class="results-header">Round Results</h3>
            <pre id="resultsArea" class="results-area">No results yet.</pre>
        </section>

        <!-- Game log -->
        <section class="log-section">
            <h3 class="log-header">Game Log</h3>
            <div id="logArea" class="log-area"></div>
        </section>

    </main>

    <script src="game.js"></script>
</body>
</html>
